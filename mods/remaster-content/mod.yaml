Metadata:
	Title: mod-title
	Version: {DEV_VERSION}
	Hidden: true

FileSystem: DefaultFileSystem
	Packages:
		^EngineDir
		^EngineDir|mods/common-content: content
		^EngineDir|mods/common: common
		^EngineDir|mods/cnc: cnc
		$remaster-content: cnccontent
		cnc|uibits

RemasterModContent:
	Mod: cnc
	ContentSources:
		remaster-remastered: modcontent-source-remaster-remastered
			steam:
				Type: Steam
					AppId: 1213210
			origin:
				Type: RegistryDirectory
				RegistryPrefixes: HKEY_LOCAL_MACHINE\Software\, HKEY_LOCAL_MACHINE\SOFTWARE\Wow6432Node\
				RegistryKey: Petroglyph\CnCRemastered
				RegistryValue: Install Dir
		remaster-classic: modcontent-source-remaster-classic
			steam:
				Type: Steam
					AppId: 1213210
			origin:
				Type: RegistryDirectory
				RegistryPrefixes: HKEY_LOCAL_MACHINE\Software\, HKEY_LOCAL_MACHINE\SOFTWARE\Wow6432Node\
				RegistryKey: Petroglyph\CnCRemastered
				RegistryValue: Install Dir
		tuc: modcontent-source-tuc
			steam:
				Type: Steam
					AppId: 2229830
			origin:
				Type: RegistryDirectory
				RegistryPrefixes: HKEY_LOCAL_MACHINE\Software\, HKEY_LOCAL_MACHINE\SOFTWARE\Wow6432Node\
				RegistryKey: EA Games\CNC and The Covert Operations
				RegistryValue: Install Dir

Rules:

Cursors:
	content|cursors.yaml

Chrome:
	cnc|chrome.yaml

Assemblies: OpenRA.Mods.Common.dll, OpenRA.Mods.Cnc.dll, OpenRA.Mods.Mobius.dll

ChromeLayout:
	cnccontent|prompt.yaml

Notifications:
	content|notifications.yaml

LoadScreen: RemasterContentLoadScreen
	Image: cnc|uibits/chrome.png
	Image2x: cnc|uibits/chrome-2x.png
	Image3x: cnc|uibits/chrome-3x.png

ChromeMetrics:
	common|metrics.yaml
	content|metrics.yaml

FluentMessages:
	common|fluent/common.ftl
	content|fluent/content.ftl
	content|fluent/chrome.ftl
	cnccontent|prompt.ftl

Fonts:
	Tiny:
		Font: common|FreeSans.ttf
		Size: 10
		Ascender: 8
	TinyBold:
		Font: common|FreeSansBold.ttf
		Size: 10
		Ascender: 8
	Regular:
		Font: common|FreeSans.ttf
		Size: 14
		Ascender: 11
	Bold:
		Font: common|FreeSansBold.ttf
		Size: 14
		Ascender: 11
	MediumBold:
		Font: common|FreeSansBold.ttf
		Size: 18
		Ascender: 14
	BigBold:
		Font: common|FreeSansBold.ttf
		Size: 24
		Ascender: 18

SoundFormats:

SpriteFormats: PngSheet

TerrainFormat: DefaultTerrain

SpriteSequenceFormat: DefaultSpriteSequence
